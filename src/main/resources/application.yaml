server:
  port: 8080

spring:
  application:
    name: apigateway3

  cloud:
    gateway:
      server:
        webmvc:
          use-framework-retry-filter: true
          routes:
            - id: donaciones
              uri: http://localhost:8081
              predicates:
                - Path=/api/donaciones/**
              filters:
                - StripPrefix=2
                - Retry=2

            - id: necesidades
              uri: http://localhost:8082
              predicates:
                - Path=/api/necesidades/**
              filters:
                - StripPrefix=2
                - Retry=2

            - id: logistica
              uri: http://localhost:8083
              predicates:
                - Path=/api/logistica/**
              filters:
                - StripPrefix=2
                - Retry=2